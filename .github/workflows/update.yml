name: Actualizar dashboard aretē

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run diagnostico
        env:
          MOMENCE_CLIENT_ID: ${{ secrets.MOMENCE_CLIENT_ID }}
          MOMENCE_CLIENT_SECRET: ${{ secrets.MOMENCE_CLIENT_SECRET }}
          MOMENCE_EMAIL: ${{ secrets.MOMENCE_EMAIL }}
          MOMENCE_PASSWORD: ${{ secrets.MOMENCE_PASSWORD }}
        run: python diagnostico.py
